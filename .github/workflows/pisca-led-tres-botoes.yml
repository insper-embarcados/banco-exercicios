name: pisca-led-tres-botoes

on:
  push:
    paths:
      - 'pisca-led-tres-botoes/main.c'
jobs:
  pisca-led-tres-botoes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: insper-embarcados/pico-build@v1
      - uses: insper-embarcados/actions-wokwi-test@v3
        with:
          token: ${{ secrets.WOKWI_CLI_TOKEN }}
          test_name: exe1
      - uses: insper-embarcados/actions-firmware-rubric-check@v0
        with:
          c_file: pisca-led-tres-botoes/main.c
          rubric_file: pisca-led-tres-botoes/rubric_firmware.yml
      - uses: insper-embarcados/actions-embedded-check@v1
        with:
          c_file: pisca-led-tres-botoes/main.c
      - uses: insper-embarcados/actions-cppcheck@v1
        with:
          c_file: pisca-led-tres-botoes/main.c
